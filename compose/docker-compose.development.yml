# CleanTenant — Development Ortam Override'ı
#
# Geliştirici makinesinde çalışacak konfigürasyon:
# - Tüm portlar host'a expose edilir (DB IDE'leri / araçları bağlanabilsin).
# - Seq servisi eklenir (yerel log inceleme).
# - Volume'lar persist eder; env-reset ile silinir.

services:

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # ----------------------------------------------------------------------
  # Seq — Yerel log inceleme arayüzü. Sadece Dev/Demo'da kullanılır.
  # Erişim: http://localhost:${SEQ_PORT}
  # İlk giriş için admin şifresi SEQ_ADMIN_PASSWORD_HASH ortam değişkeninden
  # gelir (hash üretimi için .env.development.example yorum satırlarına bakın).
  # ----------------------------------------------------------------------
  seq:
    image: datalust/seq:latest
    container_name: ${COMPOSE_PROJECT_NAME:-cleantenant}-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: ${SEQ_ADMIN_PASSWORD_HASH}
      TZ: UTC
    ports:
      - "${SEQ_PORT:-5341}:80"
    volumes:
      - seq-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - cleantenant-net

  # ----------------------------------------------------------------------
  # pgAdmin — PostgreSQL yönetim arayüzü. SADECE Development ortamında.
  # Erişim: http://localhost:${PGADMIN_PORT}
  #
  # Login bypass (desktop mode):
  #   PGADMIN_CONFIG_SERVER_MODE=False ile pgAdmin tek kullanıcılı modda
  #   açılır; e-posta/şifre ekranı atlanır.
  # Otomatik bağlantı:
  #   compose/pgadmin/servers.json içinde 4 DB (Catalog/Main/Log/Audit)
  #   önceden tanımlıdır.
  # Otomatik şifre:
  #   compose/pgadmin/entrypoint.sh runtime'da POSTGRES_USER/POSTGRES_PASSWORD
  #   env değerlerinden /tmp/pgpass (chmod 0600) üretir; servers.json bu
  #   dosyaya PassFile olarak işaret eder.
  # Postgres şifresi .env.development içinde değişirse pgAdmin container'ı
  # restart etmek yeterlidir.
  # ----------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${COMPOSE_PROJECT_NAME:-cleantenant}-pgadmin
    user: root
    entrypoint: ["/pgadmin4/entrypoint.sh"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-dev@cleantenant.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-dev}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_DISABLE_POSTFIX: "True"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: UTC
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/entrypoint.sh:/pgadmin4/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - cleantenant-net

volumes:
  seq-data:
    name: ${COMPOSE_PROJECT_NAME:-cleantenant}-seq-data
  pgadmin-data:
    name: ${COMPOSE_PROJECT_NAME:-cleantenant}-pgadmin-data
